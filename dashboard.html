<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الموظف - نظام المحاسبة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Tahoma', 'Arial', sans-serif;
            background: #f5f5f5;
        }
        
        .header {
            background: linear-gradient(135deg, #1e3a5f, #0a2f44);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .logo h2 {
            font-size: 24px;
        }
        
        .user-info {
            background: rgba(255,255,255,0.2);
            padding: 8px 15px;
            border-radius: 20px;
        }
        
        .logout-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            margin-right: 10px;
        }
        
        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }
        
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        
        .card h3 {
            color: #666;
            margin-bottom: 10px;
        }
        
        .card .amount {
            font-size: 28px;
            font-weight: bold;
            color: #1e3a5f;
        }
        
        .transactions-section {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        
        .section-title {
            font-size: 20px;
            color: #1e3a5f;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #eee;
        }
        
        .transaction-item {
            background: #f8f9fa;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 10px;
            border-right: 4px solid #ffc107;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .transaction-item.pending {
            border-right-color: #ffc107;
            background: #fff9e6;
        }
        
        .transaction-item.confirmed {
            border-right-color: #28a745;
            background: #e8f5e9;
        }
        
        .transaction-item .info {
            flex: 1;
        }
        
        .transaction-item .date {
            font-size: 12px;
            color: #666;
        }
        
        .transaction-item .amount {
            font-size: 18px;
            font-weight: bold;
            color: #1e3a5f;
        }
        
        .status {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .status.pending {
            background: #ffc107;
            color: #000;
        }
        
        .status.confirmed {
            background: #28a745;
            color: white;
        }
        
        .object-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            margin-right: 10px;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 500px;
        }
        
        .modal-content textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin: 15px 0;
            font-family: inherit;
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        
        .btn-primary {
            background: #1e3a5f;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .btn-secondary {
            background: #6c757d;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }
            
            .transaction-item {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
            <h2>📊 نظام المحاسبة</h2>
        </div>
        <div>
            <span class="user-info">👤 رقم العضوية: <span id="memberIdDisplay"></span></span>
            <button class="logout-btn" onclick="logout()">خروج</button>
        </div>
    </div>
    
    <div class="container">
        <div class="summary-cards">
            <div class="card">
                <h3>📈 إجمالي المستحق</h3>
                <div class="amount" id="totalPending">0 ريال</div>
            </div>
            <div class="card">
                <h3>✅ إجمالي المستلم</h3>
                <div class="amount" id="totalConfirmed">0 ريال</div>
            </div>
            <div class="card">
                <h3>⏳ قيد المراجعة</h3>
                <div class="amount" id="pendingCount">0</div>
            </div>
        </div>
        
        <div class="transactions-section">
            <h3 class="section-title">📋 المعاملات المالية</h3>
            <div id="transactionsList"></div>
        </div>
        
        <div class="transactions-section">
            <h3 class="section-title">🧵 إنتاج الخياطة</h3>
            <div id="productionList"></div>
        </div>
    </div>
    
    <!-- Modal الاعتراض -->
    <div id="objectModal" class="modal">
        <div class="modal-content">
            <h3>✍️ تقديم اعتراض</h3>
            <label>رقم المعاملة:</label>
            <input type="text" id="objectTransactionId" readonly style="width:100%; padding:8px; margin:10px 0; border:1px solid #ddd; border-radius:5px;">
            <label>سبب الاعتراض:</label>
            <textarea id="objectReason" rows="4" placeholder="اكتب سبب الاعتراض بالتفصيل..."></textarea>
            <div class="modal-buttons">
                <button class="btn-secondary" onclick="closeModal()">إلغاء</button>
                <button class="btn-primary" onclick="sendObjection()">إرسال الاعتراض</button>
            </div>
        </div>
    </div>
    
    <script>
        let currentMemberId = '';
        let transactions = [];
        let productions = [];
        
        // تحميل البيانات من localStorage
        function loadData() {
            currentMemberId = localStorage.getItem('memberId');
            document.getElementById('memberIdDisplay').innerText = currentMemberId;
            
            // تحميل المعاملات
            const allTransactions = JSON.parse(localStorage.getItem('transactions') || '[]');
            transactions = allTransactions.filter(t => t.memberId === currentMemberId);
            
            // تحميل الإنتاج
            const allProductions = JSON.parse(localStorage.getItem('productions') || '[]');
            productions = allProductions.filter(p => p.memberId === currentMemberId);
            
            updateUI();
        }
        
        function updateUI() {
            // حساب الإجماليات
            const pendingTotal = transactions.filter(t => t.status === 'pending').reduce((sum, t) => sum + t.amount, 0);
            const confirmedTotal = transactions.filter(t => t.status === 'confirmed').reduce((sum, t) => sum + t.amount, 0);
            const pendingCount = transactions.filter(t => t.status === 'pending').length;
            
            document.getElementById('totalPending').innerHTML = pendingTotal.toLocaleString() + ' ريال';
            document.getElementById('totalConfirmed').innerHTML = confirmedTotal.toLocaleString() + ' ريال';
            document.getElementById('pendingCount').innerHTML = pendingCount;
            
            // عرض المعاملات
            const transactionsHtml = transactions.map(t => `
                <div class="transaction-item ${t.status}">
                    <div class="info">
                        <div><strong>${t.description || 'معاملة مالية'}</strong></div>
                        <div class="date">📅 ${t.date} | 🔄 ${t.type} | 🏷️ ${t.category || 'عام'}</div>
                    </div>
                    <div class="amount">${t.amount.toLocaleString()} ريال</div>
                    <div>
                        <span class="status ${t.status}">${t.status === 'pending' ? '⏳ قيد المراجعة' : '✅ مؤكد'}</span>
                        ${t.status === 'pending' ? `<button class="object-btn" onclick="openModal('${t.id}')">✋ اعتراض</button>` : ''}
                    </div>
                </div>
            `).join('');
            
            document.getElementById('transactionsList').innerHTML = transactionsHtml || '<p style="text-align:center; color:#666;">لا توجد معاملات</p>';
            
            // عرض الإنتاج
            const productionsHtml = productions.map(p => `
                <div class="transaction-item ${p.status}">
                    <div class="info">
                        <div><strong>${p.productName || 'منتج'}</strong></div>
                        <div class="date">📅 ${p.date} | 👕 ${p.model || 'موديل'}</div>
                    </div>
                    <div class="amount">${p.quantity} قطعة</div>
                    <div>
                        <span class="status ${p.status}">${p.status === 'pending' ? '⏳ قيد المراجعة' : '✅ مؤكد'}</span>
                        ${p.status === 'pending' ? `<button class="object-btn" onclick="openProductionModal('${p.id}')">✋ اعتراض</button>` : ''}
                    </div>
                </div>
            `).join('');
            
            document.getElementById('productionList').innerHTML = productionsHtml || '<p style="text-align:center; color:#666;">لا توجد إنتاجات</p>';
        }
        
        let currentObjectTransaction = null;
        let currentObjectProduction = null;
        
        function openModal(transactionId) {
            currentObjectTransaction = transactions.find(t => t.id === transactionId);
            document.getElementById('objectTransactionId').value = currentObjectTransaction?.id || '';
            document.getElementById('objectReason').value = '';
            document.getElementById('objectModal').style.display = 'flex';
        }
        
        function openProductionModal(productionId) {
            currentObjectProduction = productions.find(p => p.id === productionId);
            document.getElementById('objectTransactionId').value = currentObjectProduction?.productName || '';
            document.getElementById('objectReason').value = '';
            document.getElementById('objectModal').style.display = 'flex';
        }
        
        function closeModal() {
            document.getElementById('objectModal').style.display = 'none';
            currentObjectTransaction = null;
            currentObjectProduction = null;
        }
        
        function sendObjection() {
            const reason = document.getElementById('objectReason').value;
            if (!reason) {
                alert('الرجاء كتابة سبب الاعتراض');
                return;
            }
            
            let message = '';
            if (currentObjectTransaction) {
                message = `📢 اعتراض على معاملة\n\n` +
                         `رقم العضوية: ${currentMemberId}\n` +
                         `رقم المعاملة: ${currentObjectTransaction.id}\n` +
                         `المبلغ: ${currentObjectTransaction.amount} ريال\n` +
                         `التاريخ: ${currentObjectTransaction.date}\n` +
                         `الوصف: ${currentObjectTransaction.description}\n` +
                         `سبب الاعتراض: ${reason}\n\n` +
                         `الرجاء المراجعة والتأكيد.`;
            } else if (currentObjectProduction) {
                message = `📢 اعتراض على إنتاج\n\n` +
                         `رقم العضوية: ${currentMemberId}\n` +
                         `المنتج: ${currentObjectProduction.productName}\n` +
                         `الكمية: ${currentObjectProduction.quantity} قطعة\n` +
                         `التاريخ: ${currentObjectProduction.date}\n` +
                         `سبب الاعتراض: ${reason}\n\n` +
                         `الرجاء المراجعة والتأكيد.`;
            }
            
            // إرسال إلى واتساب
            const phoneNumber = '777524788';
            const whatsappUrl = `https://wa.me/${phoneNumber}?text=${encodeURIComponent(message)}`;
            window.open(whatsappUrl, '_blank');
            
            // حفظ الاعتراض في localStorage
            const objections = JSON.parse(localStorage.getItem('objections') || '[]');
            objections.push({
                id: Date.now(),
                memberId: currentMemberId,
                transactionId: currentObjectTransaction?.id,
                productionId: currentObjectProduction?.id,
                reason: reason,
                date: new Date().toLocaleDateString('ar-EG'),
                status: 'pending'
            });
            localStorage.setItem('objections', JSON.stringify(objections));
            
            alert('تم إرسال الاعتراض بنجاح إلى المشرف عبده');
            closeModal();
        }
        
        function logout() {
            localStorage.removeItem('memberId');
            window.location.href = 'index.html';
        }
        
        // تشغيل نظام التكرار التلقائي
        function runAutoRecurring() {
            const recurringSettings = JSON.parse(localStorage.getItem('recurringSettings') || '[]');
            const today = new Date().toLocaleDateString('ar-EG');
            
            recurringSettings.forEach(setting => {
                if (setting.memberId === currentMemberId && setting.status === 'active') {
                    // التحقق من تاريخ التكرار
                    const lastRun = setting.lastRun || '';
                    if (lastRun !== today) {
                        // إنشاء معاملة جديدة متوقعة
                        const newTransaction = {
                            id: Date.now() + Math.random(),
                            memberId: setting.memberId,
                            amount: setting.amount,
                            description: setting.description,
                            type: setting.type,
                            category: setting.category,
                            date: today,
                            status: 'pending',
                            expected: true
                        };
                        
                        const allTransactions = JSON.parse(localStorage.getItem('transactions') || '[]');
                        allTransactions.push(newTransaction);
                        localStorage.setItem('transactions', JSON.stringify(allTransactions));
                        
                        // تحديث آخر تاريخ تشغيل
                        setting.lastRun = today;
                        localStorage.setItem('recurringSettings', JSON.stringify(recurringSettings));
                    }
                }
            });
            
            loadData();
        }
        
        // تشغيل التكرار التلقائي عند تحميل الصفحة
        runAutoRecurring();
        
        // تشغيل التكرار كل ساعة
        setInterval(runAutoRecurring, 3600000);
        
        loadData();
    </script>
</body>
</html>
