<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الموظف - نظام المحاسبة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Tahoma', 'Arial', sans-serif;
            background: #f5f5f5;
        }
        
        .header {
            background: linear-gradient(135deg, #1e3a5f, #0a2f44);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .logo h2 {
            font-size: 24px;
        }
        
        .user-info {
            background: rgba(255,255,255,0.2);
            padding: 8px 15px;
            border-radius: 20px;
        }
        
        .logout-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            margin-right: 10px;
        }
        
        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }
        
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        
        .card h3 {
            color: #666;
            margin-bottom: 10px;
        }
        
        .card .amount {
            font-size: 28px;
            font-weight: bold;
            color: #1e3a5f;
        }
        
        .transactions-section {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        
        .section-title {
            font-size: 20px;
            color: #1e3a5f;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #eee;
        }
        
        .transaction-item {
            background: #f8f9fa;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 10px;
            border-right: 4px solid #ffc107;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .transaction-item.confirmed {
            border-right-color: #28a745;
            background: #e8f5e9;
        }
        
        .transaction-item .info {
            flex: 1;
        }
        
        .transaction-item .date {
            font-size: 12px;
            color: #666;
        }
        
        .transaction-item .amount {
            font-size: 18px;
            font-weight: bold;
            color: #1e3a5f;
        }
        
        .status {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .status.pending {
            background: #ffc107;
            color: #000;
        }
        
        .status.confirmed {
            background: #28a745;
            color: white;
        }
        
        .object-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            margin-right: 10px;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 500px;
        }
        
        .modal-content textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin: 15px 0;
            font-family: inherit;
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        
        .btn-primary {
            background: #1e3a5f;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .btn-secondary {
            background: #6c757d;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }
            
            .transaction-item {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
            <h2>📊 نظام المحاسبة</h2>
        </div>
        <div>
            <span class="user-info">👤 <span id="memberName"></span> | <span id="memberId"></span></span>
            <button class="logout-btn" onclick="logout()">خروج</button>
        </div>
    </div>
    
    <div class="container">
        <div class="summary-cards">
            <div class="card">
                <h3>📈 إجمالي المستحق</h3>
                <div class="amount" id="totalPending">0 ريال</div>
            </div>
            <div class="card">
                <h3>✅ إجمالي المستلم</h3>
                <div class="amount" id="totalConfirmed">0 ريال</div>
            </div>
            <div class="card">
                <h3>⏳ قيد المراجعة</h3>
                <div class="amount" id="pendingCount">0</div>
            </div>
        </div>
        
        <div class="transactions-section">
            <h3 class="section-title">📋 المعاملات المالية</h3>
            <div id="transactionsList"></div>
        </div>
        
        <div class="transactions-section">
            <h3 class="section-title">🧵 إنتاج الخياطة</h3>
            <div id="productionList"></div>
        </div>
    </div>
    
    <div id="objectModal" class="modal">
        <div class="modal-content">
            <h3>✋ تقديم اعتراض</h3>
            <label>نوع المعاملة:</label>
            <input type="text" id="objectType" readonly style="width:100%; padding:8px; margin:10px 0; border:1px solid #ddd; border-radius:5px;">
            <label>سبب الاعتراض:</label>
            <textarea id="objectReason" rows="4" placeholder="اكتب سبب الاعتراض بالتفصيل..."></textarea>
            <div class="modal-buttons">
                <button class="btn-secondary" onclick="closeModal()">إلغاء</button>
                <button class="btn-primary" onclick="sendObjection()">إرسال الاعتراض</button>
            </div>
        </div>
    </div>
    
    <script type="module">
        import { supabase, getTransactions, getProductions, addObjection } from './supabase.js';
        
        let currentMemberId = '';
        let currentMemberName = '';
        let currentTransactions = [];
        let currentProductions = [];
        let currentObjectItem = null;
        let currentObjectType = '';
        
        // تحميل بيانات المستخدم
        function loadUserData() {
            currentMemberId = localStorage.getItem('memberId');
            currentMemberName = localStorage.getItem('memberName');
            
            document.getElementById('memberId').innerText = currentMemberId;
            document.getElementById('memberName').innerText = currentMemberName;
        }
        
        // تحميل المعاملات
        async function loadTransactions() {
            try {
                const transactions = await getTransactions({ member_id: currentMemberId });
                currentTransactions = transactions;
                
                const pendingTotal = transactions.filter(t => t.status === 'pending').reduce((sum, t) => sum + t.amount, 0);
                const confirmedTotal = transactions.filter(t => t.status === 'confirmed').reduce((sum, t) => sum + t.amount, 0);
                const pendingCount = transactions.filter(t => t.status === 'pending').length;
                
                document.getElementById('totalPending').innerHTML = pendingTotal.toLocaleString() + ' ريال';
                document.getElementById('totalConfirmed').innerHTML = confirmedTotal.toLocaleString() + ' ريال';
                document.getElementById('pendingCount').innerHTML = pendingCount;
                
                const html = transactions.map(t => `
                    <div class="transaction-item ${t.status}">
                        <div class="info">
                            <div><strong>${t.description || 'معاملة مالية'}</strong></div>
                            <div class="date">📅 ${t.date} | 🏷️ ${t.category || 'عام'}</div>
                        </div>
                        <div class="amount">${t.amount.toLocaleString()} ريال</div>
                        <div>
                            <span class="status ${t.status}">${t.status === 'pending' ? '⏳ قيد المراجعة' : '✅ مؤكد'}</span>
                            ${t.status === 'pending' ? `<button class="object-btn" onclick='openObjection("transaction", ${JSON.stringify(t).replace(/'/g, "\\'")})'>✋ اعتراض</button>` : ''}
                        </div>
                    </div>
                `).join('');
                
                document.getElementById('transactionsList').innerHTML = html || '<p style="text-align:center; color:#666;">لا توجد معاملات</p>';
            } catch (error) {
                console.error('خطأ في تحميل المعاملات:', error);
                document.getElementById('transactionsList').innerHTML = '<p style="text-align:center; color:red;">حدث خطأ في تحميل المعاملات</p>';
            }
        }
        
        // تحميل الإنتاج
        async function loadProductions() {
            try {
                const productions = await getProductions({ member_id: currentMemberId });
                currentProductions = productions;
                
                const html = productions.map(p => `
                    <div class="transaction-item ${p.status}">
                        <div class="info">
                            <div><strong>${p.product_name}</strong> - ${p.model || 'موديل غير محدد'}</div>
                            <div class="date">📅 ${p.date} | 📦 ${p.quantity} قطعة</div>
                        </div>
                        <div class="amount">${p.price ? p.price.toLocaleString() + ' ريال' : 'سعر غير محدد'}</div>
                        <div>
                            <span class="status ${p.status}">${p.status === 'pending' ? '⏳ قيد المراجعة' : '✅ مؤكد'}</span>
                            ${p.status === 'pending' ? `<button class="object-btn" onclick='openObjection("production", ${JSON.stringify(p).replace(/'/g, "\\'")})'>✋ اعتراض</button>` : ''}
                        </div>
                    </div>
                `).join('');
                
                document.getElementById('productionList').innerHTML = html || '<p style="text-align:center; color:#666;">لا توجد إنتاجات</p>';
            } catch (error) {
                console.error('خطأ في تحميل الإنتاج:', error);
                document.getElementById('productionList').innerHTML = '<p style="text-align:center; color:red;">حدث خطأ في تحميل الإنتاج</p>';
            }
        }
        
        // فتح نافذة الاعتراض
        window.openObjection = function(type, item) {
            currentObjectType = type;
            currentObjectItem = item;
            document.getElementById('objectType').value = type === 'transaction' ? 'معاملة مالية: ' + item.description : 'إنتاج: ' + item.product_name;
            document.getElementById('objectReason').value = '';
            document.getElementById('objectModal').style.display = 'flex';
        }
        
        // إرسال الاعتراض
        window.sendObjection = async function() {
            const reason = document.getElementById('objectReason').value;
            if (!reason) {
                alert('الرجاء كتابة سبب الاعتراض');
                return;
            }
            
            try {
                const objection = {
                    member_id: currentMemberId,
                    transaction_id: currentObjectType === 'transaction' ? currentObjectItem.id : null,
                    production_id: currentObjectType === 'production' ? currentObjectItem.id : null,
                    reason: reason
                };
                
                await addObjection(objection);
                
                // إرسال رسالة واتساب
                const message = `📢 اعتراض من ${currentMemberName} (${currentMemberId})\n\n` +
                              `النوع: ${currentObjectType === 'transaction' ? 'معاملة مالية' : 'إنتاج'}\n` +
                              `التفاصيل: ${currentObjectType === 'transaction' ? currentObjectItem.description : currentObjectItem.product_name}\n` +
                              `المبلغ/الكمية: ${currentObjectType === 'transaction' ? currentObjectItem.amount + ' ريال' : currentObjectItem.quantity + ' قطعة'}\n` +
                              `التاريخ: ${currentObjectItem.date}\n` +
                              `سبب الاعتراض: ${reason}`;
                
                const whatsappUrl = `https://wa.me/777524788?text=${encodeURIComponent(message)}`;
                window.open(whatsappUrl, '_blank');
                
                alert('تم إرسال الاعتراض بنجاح');
                closeModal();
            } catch (error) {
                console.error('خطأ في إرسال الاعتراض:', error);
                alert('حدث خطأ في إرسال الاعتراض');
            }
        }
        
        function closeModal() {
            document.getElementById('objectModal').style.display = 'none';
            currentObjectItem = null;
        }
        
        window.closeModal = closeModal;
        
        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
        
        window.logout = logout;
        
        // تهيئة الصفحة
        loadUserData();
        loadTransactions();
        loadProductions();
    </script>
</body>
</html>
