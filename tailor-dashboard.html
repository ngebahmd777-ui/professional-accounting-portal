<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الخياط - نظام المحاسبة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Tahoma', 'Arial', sans-serif;
            background: #f5f5f5;
        }
        
        .header {
            background: linear-gradient(135deg, #2e7d32, #1b5e20);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .production-list {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .production-item {
            background: #f8f9fa;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 10px;
            border-right: 4px solid #ffc107;
        }
        
        .logout-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
        }
        
        .object-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h2>🧵 لوحة الخياط - نظام المحاسبة</h2>
        <button class="logout-btn" onclick="logout()">خروج</button>
    </div>
    
    <div class="container">
        <div class="stats">
            <div class="stat-card">
                <h3>📦 إجمالي الإنتاج</h3>
                <div class="amount" id="totalQuantity">0 قطعة</div>
            </div>
            <div class="stat-card">
                <h3>⏳ قيد المراجعة</h3>
                <div class="amount" id="pendingCount">0</div>
            </div>
        </div>
        
        <div class="production-list">
            <h3>🧵 إنتاجاتي</h3>
            <div id="productionsList"></div>
        </div>
    </div>
    
    <script>
        let memberId = localStorage.getItem('memberId') || 'M002';
        
        function loadProductions() {
            const allProductions = JSON.parse(localStorage.getItem('productions') || '[]');
            const myProductions = allProductions.filter(p => p.memberId === memberId);
            
            const totalQuantity = myProductions.reduce((sum, p) => sum + p.quantity, 0);
            const pendingCount = myProductions.filter(p => p.status === 'pending').length;
            
            document.getElementById('totalQuantity').innerHTML = totalQuantity + ' قطعة';
            document.getElementById('pendingCount').innerHTML = pendingCount;
            
            const html = myProductions.map(p => `
                <div class="production-item">
                    <div><strong>${p.productName}</strong> - ${p.model || 'موديل غير محدد'}</div>
                    <div>📦 الكمية: ${p.quantity} قطعة</div>
                    <div>💰 السعر: ${p.price ? p.price.toLocaleString() + ' ريال' : 'غير محدد (سيتم تحديده لاحقاً)'}</div>
                    <div>📅 التاريخ: ${p.date}</div>
                    <div>✅ الحالة: ${p.status === 'confirmed' ? 'مؤكد' : '⏳ قيد المراجعة'}</div>
                    ${p.status === 'pending' ? `<button class="object-btn" onclick="objectProduction('${p.id}', '${p.productName}')">✋ اعتراض على الإنتاج</button>` : ''}
                </div>
            `).join('');
            
            document.getElementById('productionsList').innerHTML = html || '<p>لا توجد إنتاجات</p>';
        }
        
        function objectProduction(id, productName) {
            const reason = prompt('✋ سبب الاعتراض على إنتاج ' + productName + ':');
            if (reason) {
                const objections = JSON.parse(localStorage.getItem('objections') || '[]');
                objections.push({
                    id: Date.now(),
                    memberId: memberId,
                    productionId: id,
                    productName: productName,
                    reason: reason,
                    date: new Date().toLocaleDateString('ar-EG'),
                    status: 'pending'
                });
                localStorage.setItem('objections', JSON.stringify(objections));
                
                // إرسال واتساب
                const message = `📢 اعتراض على إنتاج\n\nرقم العضوية: ${memberId}\nالمنتج: ${productName}\nسبب الاعتراض: ${reason}`;
                window.open(`https://wa.me/777524788?text=${encodeURIComponent(message)}`, '_blank');
                
                alert('تم إرسال الاعتراض إلى المشرف عبده');
            }
        }
        
        function logout() {
            localStorage.removeItem('memberId');
            window.location.href = 'index.html';
        }
        
        loadProductions();
    </script>
</body>
</html>
