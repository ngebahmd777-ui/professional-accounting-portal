<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام المحاسبة - تسجيل الدخول</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Tahoma', 'Arial', sans-serif;
            background: linear-gradient(135deg, #1e3a5f, #0a2f44);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        
        .logo {
            font-size: 48px;
            margin-bottom: 20px;
        }
        
        h1 {
            color: #1e3a5f;
            margin-bottom: 30px;
            font-size: 24px;
        }
        
        .input-group {
            margin-bottom: 20px;
            text-align: right;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: bold;
        }
        
        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #1e3a5f;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: #1e3a5f;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #0a2f44;
        }
        
        .error {
            color: red;
            margin-top: 10px;
            font-size: 14px;
        }
        
        .info {
            margin-top: 20px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">📊💰</div>
        <h1>نظام المحاسبة</h1>
        <form id="loginForm">
            <div class="input-group">
                <label>رقم العضوية</label>
                <input type="text" id="memberId" placeholder="أدخل رقم العضوية" required>
            </div>
            <button type="submit">دخول</button>
        </form>
        <div id="errorMsg" class="error"></div>
        <div class="info">
            <p>🔹 abdh: <strong>Abdh</strong></p>
            <p>🔹 حسابات فارغة: M001, M002, M003</p>
        </div>
    </div>

    <script type="module">
        import { supabase, getMemberById } from './supabase.js';
        
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const memberId = document.getElementById('memberId').value.trim();
            const errorDiv = document.getElementById('errorMsg');
            
            if (!memberId) {
                errorDiv.textContent = 'الرجاء إدخال رقم العضوية';
                return;
            }
            
            try {
                // التحقق من وجود العضو في قاعدة البيانات
                const member = await getMemberById(memberId);
                
                if (!member) {
                    errorDiv.textContent = 'رقم العضوية غير صحيح';
                    return;
                }
                
                // حفظ معلومات المستخدم
                localStorage.setItem('memberId', member.id);
                localStorage.setItem('memberRole', member.role);
                localStorage.setItem('memberName', member.name);
                
                // التوجيه حسب الدور
                if (member.role === 'admin') {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'dashboard.html';
                }
                
            } catch (error) {
                console.error('خطأ:', error);
                errorDiv.textContent = 'حدث خطأ في الاتصال بقاعدة البيانات';
            }
        });
    </script>
</body>
</html>
